# cai-penpot — Cocoon AI tenant fork.
#
# Per cai-portal ADR 0004 D14 Phase 5b + D15. **This is the tenant
# fork — the deploy target.** Descends from the base fork
# Cocoon-AI/penpot; tracks the base fork (not upstream directly).

schema_version: 2
kind: foreign
name: cai-penpot

# Fork lineage (ADR 0004 D15). Tenant fork: parent_repo = the base
# fork. source_repo also names the base fork (the lineage origin).
upstream:
  parent_repo: Cocoon-AI/penpot
  tracking_ref: 2.15.3
  source_repo: Cocoon-AI/penpot

# Auth (ADR D4 / D5 / D13).
auth:
  alb_oidc: false
  oidc_provider: cai-portal
  role_mapping:
    penpot-admin: admin
    penpot-member: editor
    penpot-viewer: viewer

backend:
  health_path: /api/health-check

# Container posture (ADR 0004 D11 Tier 3 exception). Inherited from
# the base fork; the tenant fork accepts the exception unchanged.
container_posture:
  exception: true
  runtime_base: ubuntu:24.04
  rationale: |
    Penpot's backend startup is `/bin/bash run.sh` — JVM-flag assembly
    + env-var preprocessing. The runtime image apt-installs imagemagick,
    libwebp, libpoppler, woff-tools, and python3 for asset rendering
    (SVG → image, PDF export, font conversion). Force-fitting distroless
    would require replacing run.sh with a JVM main class and vendoring
    these libs into a distroless-Ubuntu derivative — fork delta we
    cannot maintain across upstream rebases. See cai-portal ADR 0004 D11.

# Observability (ADR D10 — cai-otel-collector sidecar).
#
# service_name is `cai-penpot` — becomes the Loki `job` label and the
# trace `service.name` resource attribute. Same naming convention
# native apps use (cai-portal, cai-penpot, polly-c …) so foreign apps
# appear in Grafana with no special-casing.
observability:
  enabled: true
  service_name: cai-penpot
  log_format: text                  # Penpot defaults to text;
                                    # PENPOT_LOG_FORMAT=json is opt-in.
  metrics_path: /api/metrics
  metrics_port: 6060
  auto_instrument: jvm              # Pattern 2: JVM OTel javaagent.

# Deployment target — Cocoon's live cai-apps account (ADR D6).
deployment:
  account: cai-apps
  database: postgres-on-ec2         # ADR D7 default.

mailer:
  smtp_relay: true                  # Penpot has email flows.
